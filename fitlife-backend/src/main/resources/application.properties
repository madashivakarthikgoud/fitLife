# Server

#Test
server.port=${SERVER_PORT:8090}

# MySQL
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/fitlife}
spring.datasource.username=${DATASOURCE_USER:root}
spring.datasource.password=${DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:fitLifeDefaultSecretKeyThatIsLongEnoughForHS256Algorithm2026}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always